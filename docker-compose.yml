services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-tramplin}
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://tramplin:tramplin@db:5432/tramplin?sslmode=disable}
      MIGRATIONS_DIR: ${DOCKER_MIGRATIONS_DIR:-/app/migrations}
      S3_ENDPOINT: ${DOCKER_S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-tramplin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-tramplin123}
      S3_BUCKET: ${S3_BUCKET:-tramplin}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_PUBLIC_URL: ${DOCKER_S3_PUBLIC_URL:-http://localhost:9000}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_TTL: ${JWT_TTL:-24h}
    ports:
      - "${APP_HOST_PORT:-8081}:8080"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tramplin}
      POSTGRES_USER: ${POSTGRES_USER:-tramplin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tramplin}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tramplin} -d ${POSTGRES_DB:-tramplin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-tramplin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-tramplin123}
    ports:
      - "${S3_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    restart: unless-stopped
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
