      company_size:
        type: string
      description:
        type: string
      email_domain:
        type: string
      founded_year:
        type: integer
      hq_city_id:
        type: integer
      industry:
        type: string
      inn:
        type: string
      legal_name:
        type: string
      ogrn:
        type: string
      website_url:
        type: string
    type: object
  dto.CompanyLinkInput:
    properties:
      link_type:
        type: string
      url:
        type: string
    type: object
  dto.ContactRequestInput:
    properties:
      message:
        type: string
      receiver_user_id:
        type: string
      status:
        type: string
    type: object
  dto.CuratorCreateInput:
