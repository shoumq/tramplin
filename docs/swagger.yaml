      curator_type:
        type: string
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  dto.EmployerProfileInput:
    properties:
      can_create_opportunities:
        example: true
        type: boolean
      can_edit_company_profile:
        example: true
        type: boolean
      is_company_owner:
        example: true
        type: boolean
      position_title:
        example: HR Lead
        type: string
    type: object
  dto.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.OpportunityInput:
    properties:
      application_deadline:
        type: string
      contacts_info:
        type: string
      employment_type:
        type: string
      event_end_at:
        type: string
      event_start_at:
        type: string
      expires_at:
        type: string
      external_url:
        type: string
      full_description:
        type: string
      is_salary_visible:
        type: boolean
      location_id:
        type: string
      opportunity_type:
        type: string
      salary_currency:
        type: string
      salary_max:
        type: number
      salary_min:
        type: number
      short_description:
        type: string
      status:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      title:
        type: string
      vacancy_level:
        type: string
      work_format:
        type: string
    type: object
  dto.PortfolioProjectInput:
    properties:
      demo_url:
        type: string
      description:
        type: string
      finished_at:
        type: string
      project_url:
        type: string
      repository_url:
        type: string
      started_at:
        type: string
      title:
        type: string
    type: object
  dto.RecommendationInput:
    properties:
      message:
        type: string
      opportunity_id:
        type: string
      to_user_id:
        type: string
    type: object
  dto.RegisterInput:
    properties:
      company_name:
        example: Tramplin Tech
        type: string
      display_name:
        example: Ivan Petrov
        type: string
      email:
        example: student@tramplin.local
        type: string
      password:
        example: secret123
        type: string
      role:
        enum:
        - student
        - employer
        example: student
        type: string
    type: object
  dto.ResumeInput:
    properties:
      education_text:
        type: string
      experience_text:
        type: string
      summary:
        type: string
      title:
        type: string
    type: object
  dto.StatusPayload:
    properties:
      comment:
        example: Looks good
        type: string
      status:
        example: approved
        type: string
    type: object
  dto.StudentProfileInput:
    properties:
      about:
        type: string
      city_id:
        type: integer
      faculty:
        type: string
      first_name:
        type: string
      github_url:
        type: string
      graduation_year:
        type: integer
      last_name:
        type: string
      linkedin_url:
        type: string
      middle_name:
        type: string
      profile_visibility:
        type: string
      show_applications:
        type: boolean
      show_career_interests:
        type: boolean
      show_resume:
        type: boolean
      specialization:
        type: string
      study_year:
        type: integer
      telegram:
        type: string
      university_name:
        type: string
      website_url:
        type: string
    type: object
  dto.VerificationInput:
    properties:
      corporate_email:
        type: string
      documents_comment:
        type: string
      inn_submitted:
        type: string
      verification_method:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: bad request
        type: string
      status:
        example: error
        type: string
    type: object
  handlers.SuccessResponse:
    properties:
      data: {}
      status:
        example: ok
        type: string
    type: object
